# On-prem stack: one command brings up API + DB + object storage + web.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: conformix
      POSTGRES_USER: conformix
      POSTGRES_PASSWORD: conformix
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: conformix
      MINIO_ROOT_PASSWORD: conformix123
    volumes: [miniodata:/data]
    ports: ["9000:9000", "9001:9001"]

  api:
    build: ../backend
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=conformix;Username=conformix;Password=conformix"
      Cors__Origin: "http://localhost:8080"
    depends_on: [postgres, minio]
    ports: ["5080:8080"]

  web:
    build: ../frontend
    depends_on: [api]
    ports: ["8080:80"]

volumes:
  pgdata:
  miniodata:
